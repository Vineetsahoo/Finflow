server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/kyc/ {
        proxy_pass http://kyc-service:8000/api/v1/kyc/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/credit/ {
        proxy_pass http://credit-score-service:8000/api/v1/credit/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/upi/ {
        proxy_pass http://upi-mandate-service:8000/api/v1/upi/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/kyc/health {
        proxy_pass http://kyc-service:8000/health;
    }

    location = /api/credit/health {
        proxy_pass http://credit-score-service:8000/health;
    }

    location = /api/upi/health {
        proxy_pass http://upi-mandate-service:8000/health;
    }

    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
