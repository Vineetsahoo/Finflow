services:
  # ---------- Infrastructure ----------
  redis:
    image: redis:7-alpine
    container_name: fintech-redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - fintech-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------- Backend Services ----------
  kyc-service:
    build:
      context: ./backend/kyc_service
      dockerfile: Dockerfile
    container_name: fintech-kyc
    ports:
      - "8001:8000"
    environment:
      - SUPABASE_DATABASE_URL=${SUPABASE_DATABASE_URL}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - STORAGE_PATH=/app/storage
    volumes:
      - kyc-storage:/app/storage
      - /tmp:/tmp
    networks:
      - fintech-network
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  credit-score-service:
    build:
      context: ./backend/credit_score_service
      dockerfile: Dockerfile
    container_name: fintech-credit
    ports:
      - "8002:8000"
    environment:
      - SUPABASE_DATABASE_URL=${SUPABASE_DATABASE_URL}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
    volumes:
      - credit-reports:/app/reports
    networks:
      - fintech-network
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  upi-mandate-service:
    build:
      context: ./backend/upi_mandate_service
      dockerfile: Dockerfile
    container_name: fintech-upi
    ports:
      - "8003:8000"
    environment:
      - SUPABASE_DATABASE_URL=${SUPABASE_DATABASE_URL}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
    networks:
      - fintech-network
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ---------- Frontend ----------
  frontend:
    image: nginx:alpine
    container_name: fintech-frontend
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - kyc-service
      - credit-score-service
      - upi-mandate-service
    networks:
      - fintech-network
    restart: unless-stopped

volumes:
  kyc-storage:
  credit-reports:

networks:
  fintech-network:
    driver: bridge
