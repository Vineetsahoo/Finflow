services:
  kyc-service:
    build:
      context: ./backend/kyc_service
      dockerfile: Dockerfile
    container_name: fintech-kyc
    ports:
      - "8001:8000"
    environment:
      - SUPABASE_DATABASE_URL=${SUPABASE_DATABASE_URL}
      - STORAGE_PATH=/app/storage
    volumes:
      - ./backend/kyc_service:/app
      - kyc-storage:/app/storage
      - /tmp:/tmp
    networks:
      - fintech-network
    restart: unless-stopped

  credit-score-service:
    build:
      context: ./backend/credit_score_service
      dockerfile: Dockerfile
    container_name: fintech-credit
    ports:
      - "8002:8000"
    environment:
      - SUPABASE_DATABASE_URL=${SUPABASE_DATABASE_URL}
    volumes:
      - ./backend/credit_score_service:/app
      - credit-reports:/app/reports
    networks:
      - fintech-network
    restart: unless-stopped

  upi-mandate-service:
    build:
      context: ./backend/upi_mandate_service
      dockerfile: Dockerfile
    container_name: fintech-upi
    ports:
      - "8003:8000"
    environment:
      - SUPABASE_DATABASE_URL=${SUPABASE_DATABASE_URL}
    volumes:
      - ./backend/upi_mandate_service:/app
    networks:
      - fintech-network
    restart: unless-stopped



  frontend:
    image: nginx:alpine
    container_name: fintech-frontend
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - kyc-service
      - credit-score-service
      - upi-mandate-service
    networks:
      - fintech-network
    restart: unless-stopped

volumes:
  kyc-storage:
  credit-reports:

networks:
  fintech-network:
    driver: bridge
